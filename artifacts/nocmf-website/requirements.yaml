packages:
  "framer-motion": "For beautiful scroll animations and page transitions"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"

images:
  - path: "artifacts/nocmf-website/public/images/hero-bg.png"
    description: "A warm, elegant photo of a young student playing a classical string instrument in a beautiful sunlit museum or concert hall, slightly blurred for text overlay, cinematic lighting, gold and orange tones"
    aspect_ratio: "16:9"
  - path: "artifacts/nocmf-website/public/images/impact.png"
    description: "A diverse group of happy students holding musical instruments, smiling, warm golden hour lighting, community feel, high quality photography, orange and gold aesthetic"
    aspect_ratio: "4:3"
  - path: "artifacts/nocmf-website/public/images/abstract-music.png"
    description: "Abstract elegant flowing lines and subtle musical motifs in gold and deep orange on a dark background, minimal and sophisticated"
    aspect_ratio: "16:9"

notes:
  - This is a static Single Page Application (SPA).
  - Navigation uses smooth scrolling to section IDs.
  - Buttons trigger toast notifications since there is no backend.
