kind = "web"
previewPath = "/"
title = "North Orange County Music Foundation"
version = "1.0.0"
id = "artifacts/nocmf-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26161

[services.development]
run = "pnpm --filter @workspace/nocmf-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nocmf-website", "run", "build" ]
publicDir = "artifacts/nocmf-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26161"
BASE_PATH = "/"
